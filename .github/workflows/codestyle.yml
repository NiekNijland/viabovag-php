name: Code Style

on:
  push:
    paths:
      - '**.php'
      - '.github/workflows/codestyle.yml'
      - 'composer.json'
      - 'composer.lock'
      - 'phpstan.neon.dist'
      - 'rector.php'

permissions:
  contents: write

jobs:
  codestyle:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Rector
        run: composer rector

      - name: Run Pint
        run: composer pint

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: Fix styling

      - name: Run PHPStan
        run: composer analyse
